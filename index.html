<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #F8F7F4;
      --card:      #FFFFFF;
      --text:      #1C1C1C;
      --muted:     #9A9189;
      --gold:      #B8936A;
      --gold-pale: #EEE0D0;
      --border:    #E5E0D8;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── LOGIN ─────────────────────────────────── */
    #login-screen {
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .l-eyebrow {
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .l-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 400;
      text-align: center;
      line-height: 1.2;
      margin-bottom: 2.75rem;
    }

    .l-title em { font-style: italic; color: var(--gold); }

    .field { margin-bottom: 1.75rem; }

    .field label {
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.55rem;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--border);
      padding: 0.6rem 0;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text);
      outline: none;
      transition: border-color 0.25s;
    }

    .field input:focus { border-color: var(--gold); }

    .l-btn {
      width: 100%;
      margin-top: 0.25rem;
      padding: 0.9rem;
      background: var(--text);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.25s;
    }

    .l-btn:hover { background: var(--gold); }

    .l-error {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.8rem;
      color: #C07070;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .l-error.show { opacity: 1; }

    /* ─── TICKETS ────────────────────────────────── */
    #ticket-screen {
      display: none;
      width: 100%;
      max-width: 540px;
      min-height: 100vh;
      padding: 4rem 1.5rem 5rem;
      margin: 0 auto;
      animation: fadeUp 0.7s ease both;
    }

    .t-header { text-align: center; margin-bottom: 3rem; }

    .t-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .t-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      line-height: 1.2;
    }

    .t-header h1 em { font-style: italic; color: var(--gold); }

    /* ── Ticket card ── */
    .ticket-list { display: flex; flex-direction: column; gap: 0.8rem; }

    .ticket {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.2s;
      position: relative;
    }

    .ticket:not(.empty):not(.used-card):hover {
      box-shadow: 0 6px 28px rgba(184,147,106,0.14);
      transform: translateY(-2px);
    }

    /* Perforated stub */
    .stub {
      width: 50px;
      min-width: 50px;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .ticket.empty .stub,
    .ticket.used-card .stub { background: #DEDAD5; }

    .stub::after {
      content: '';
      position: absolute;
      right: -7px; top: 0; bottom: 0;
      width: 14px;
      background: radial-gradient(circle at left center, var(--bg) 6px, transparent 6px);
      background-size: 14px 16px;
      background-position: 0 8px;
    }

    .stub span {
      writing-mode: vertical-rl;
      font-size: 0.55rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
    }

    .ticket.empty .stub span,
    .ticket.used-card .stub span { color: #bbb; }

    /* Card body */
    .t-body {
      flex: 1;
      padding: 1.2rem 1.2rem 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .t-info .t-name {
      font-size: 0.93rem;
      font-weight: 500;
      margin-bottom: 0.3rem;
    }

    .t-info .t-count {
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .ticket.empty .t-count,
    .ticket.used-card .t-count { color: var(--muted); }

    .use-btn {
      flex-shrink: 0;
      padding: 0.48rem 1.05rem;
      border: 1.5px solid var(--text);
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      color: var(--text);
      transition: background 0.2s, color 0.2s;
    }

    .use-btn:hover:not(:disabled) { background: var(--text); color: #fff; }

    .use-btn:disabled {
      border-color: var(--border);
      color: var(--muted);
      cursor: default;
    }

    /* Used card */
    .ticket.used-card { opacity: 0.55; }

    .used-badge {
      flex-shrink: 0;
      font-size: 0.68rem;
      color: var(--muted);
      padding: 0.4rem 0.75rem;
      border: 1px solid var(--border);
      letter-spacing: 0.08em;
    }

    /* Section divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      margin: 2.25rem 0 1rem;
    }

    .section-divider span {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── MODAL ──────────────────────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(28,28,28,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #modal-overlay.show { display: flex; }

    #modal {
      background: var(--card);
      width: 100%;
      max-width: 340px;
      padding: 2rem;
      border-radius: 2px;
      animation: fadeUp 0.25s ease both;
    }

    .modal-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .modal-ticket-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 400;
      line-height: 1.4;
      margin-bottom: 1.25rem;
    }

    .modal-warning {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 1.75rem;
      padding: 0.75rem 0.9rem;
      background: var(--bg);
      border-left: 2px solid var(--gold);
    }

    .modal-btns { display: flex; gap: 0.75rem; }

    .modal-cancel {
      flex: 1;
      padding: 0.8rem;
      background: transparent;
      border: 1.5px solid var(--border);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }

    .modal-cancel:hover { border-color: var(--muted); color: var(--text); }

    .modal-confirm {
      flex: 1;
      padding: 0.8rem;
      background: var(--text);
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      color: white;
      transition: background 0.2s;
    }

    .modal-confirm:hover { background: var(--gold); }

    /* ─── Footer & Animations ────────────────────── */
    .t-footer {
      text-align: center;
      margin-top: 2.75rem;
      font-size: 0.62rem;
      color: var(--border);
      letter-spacing: 0.12em;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes ticketFlash {
      0%   { background: var(--gold-pale); }
      100% { background: var(--card); }
    }

    .ticket.flash { animation: ticketFlash 0.55s ease forwards; }

    @media (max-width: 480px) {
      .stub { width: 42px; min-width: 42px; }
      .t-header h1 { font-size: 1.9rem; }
      .l-title { font-size: 2.1rem; }
    }
  </style>
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="login-screen">
    <p class="l-eyebrow">Birthday Gift</p>
    <h1 class="l-title">Open<br><em>your gift</em></h1>
    <div class="field">
      <label for="inp-id">Name</label>
      <input type="text" id="inp-id" placeholder="your name"
             autocomplete="off" autocapitalize="none" spellcheck="false">
    </div>
    <div class="field">
      <label for="inp-pw">Birthday</label>
      <input type="password" id="inp-pw" placeholder="••••••••">
    </div>
    <button class="l-btn" id="login-btn">Open →</button>
    <p class="l-error" id="l-error">IDまたはパスワードが違うよ 🔒</p>
  </div>

  <!-- ===== TICKETS ===== -->
  <div id="ticket-screen">
    <div class="t-header">
      <p class="t-eyebrow">For えり</p>
      <h1>Happy<br><em>Birthday</em> 🎂</h1>
    </div>
    <div class="ticket-list" id="ticket-list"></div>
    <div id="used-section" style="display:none">
      <div class="section-divider"><span>使用済み</span></div>
      <div class="ticket-list" id="used-list"></div>
    </div>
    <p class="t-footer">ページを更新すると枚数はリセットされます</p>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal-overlay">
    <div id="modal">
      <p class="modal-eyebrow">Confirm</p>
      <p class="modal-ticket-name" id="modal-ticket-name"></p>
      <p class="modal-warning">使用すると再度利用することはできません。<br>本当に使いますか？</p>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
        <button class="modal-confirm" onclick="confirmUse()">使う</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    //  ▼ ここだけ変更してください
    // ============================================================
    const CORRECT_ID = 'eririn';
    const CORRECT_PW = '20261022';
    // ============================================================

    const TICKETS = [
      { id: 1, name: '欲しいもの一点買えるよ券', total: 1 },
      { id: 2, name: '1日なんでも言うこと聞く券',  total: 5 },
      { id: 3, name: 'デパコス購入券',             total: 3 },
    ];

    const counts    = Object.fromEntries(TICKETS.map(t => [t.id, t.total]));
    const usedCounts = Object.fromEntries(TICKETS.map(t => [t.id, 0]));
    let pendingId   = null;

    // ── Login ──
    function tryLogin() {
      const id  = document.getElementById('inp-id').value.trim().toLowerCase();
      const pw  = document.getElementById('inp-pw').value.trim();
      const err = document.getElementById('l-error');
      if (id === CORRECT_ID.toLowerCase() && pw === CORRECT_PW) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('ticket-screen').style.display = 'block';
        renderAll();
      } else {
        err.classList.add('show');
        setTimeout(() => err.classList.remove('show'), 2500);
      }
    }

    document.getElementById('login-btn').addEventListener('click', tryLogin);
    document.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    // ── Modal ──
    function openModal(id) {
      const t = TICKETS.find(t => t.id === id);
      pendingId = id;
      document.getElementById('modal-ticket-name').textContent = t.name;
      document.getElementById('modal-overlay').classList.add('show');
    }

    function closeModal() {
      pendingId = null;
      document.getElementById('modal-overlay').classList.remove('show');
    }

    function confirmUse() {
      if (pendingId === null) return;
      const id = pendingId;
      closeModal();
      counts[id]--;
      usedCounts[id]++;
      const el = document.getElementById('tk-' + id);
      if (el) {
        el.classList.add('flash');
        el.addEventListener('animationend', () => {
          el.classList.remove('flash');
          renderAll();
        }, { once: true });
      } else {
        renderAll();
      }
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ── Render active tickets ──
    function renderActive() {
      const list = document.getElementById('ticket-list');
      list.innerHTML = '';
      TICKETS.forEach(t => {
        const rem   = counts[t.id];
        const empty = rem === 0;
        const el    = document.createElement('div');
        el.className = 'ticket' + (empty ? ' empty' : '');
        el.id = 'tk-' + t.id;
        el.innerHTML = `
          <div class="stub"><span>ticket</span></div>
          <div class="t-body">
            <div class="t-info">
              <div class="t-name">${t.name}</div>
              <div class="t-count">
                ${empty ? '使い切りました' : `残り <strong>${rem}</strong> 枚`}
              </div>
            </div>
            <button class="use-btn" data-id="${t.id}" ${empty ? 'disabled' : ''}>
              ${empty ? '済' : '使う'}
            </button>
          </div>`;
        list.appendChild(el);
      });

      list.querySelectorAll('.use-btn:not(:disabled)').forEach(btn => {
        btn.addEventListener('click', () => openModal(Number(btn.dataset.id)));
      });
    }

    // ── Render used section ──
    function renderUsed() {
      const section = document.getElementById('used-section');
      const list    = document.getElementById('used-list');
      const anyUsed = TICKETS.some(t => usedCounts[t.id] > 0);

      if (!anyUsed) { section.style.display = 'none'; return; }
      section.style.display = 'block';

      list.innerHTML = '';
      TICKETS.forEach(t => {
        const used = usedCounts[t.id];
        if (used === 0) return;
        const el = document.createElement('div');
        el.className = 'ticket used-card';
        el.innerHTML = `
          <div class="stub"><span>used</span></div>
          <div class="t-body">
            <div class="t-info">
              <div class="t-name">${t.name}</div>
              <div class="t-count">${used}枚 使用済み</div>
            </div>
            <span class="used-badge">✓ 使用済</span>
          </div>`;
        list.appendChild(el);
      });
    }

    function renderAll() {
      renderActive();
      renderUsed();
    }
  </script>
</body>
</html>
